<!DOCTYPE html>
<html>
<head>
    <title>Sample App - CI/CD Demo</title>
    <style>
        body { font-family: Arial; margin: 40px; background: #f5f5f5; }
        .card { background: white; padding: 30px; border-radius: 8px; max-width: 600px; }
        h1 { color: #333; }
        .info { color: #666; margin-top: 20px; }
        .badge { background: #4CAF50; color: white; padding: 5px 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sample App <span class="badge">Running</span></h1>
        <div class="info">
            <p>Built via Jenkins CI Pipeline</p>
            <p>Deployed via ArgoCD GitOps</p>
            <p>Registry: 10.10.0.1:30500</p>
        </div>
    </div>
</body>
</html>
